<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page protégée par mot de passe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        .container h2 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .content {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Entrez votre mot de passe :</h2>
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="checkPassword()">Se connecter</button>

        <div id="content" class="content">
            <h3>Accédez au script Roblox avec :</h3>
            <pre>loadstring(game:HttpGet("https://protection-script-roblox-1.onrender.com/scriptdsfdsfdsfdsfdsfdsfds"))()</pre>
        </div>
    </div>

    <script>
        function checkPassword() {
            var enteredPassword = document.getElementById("password").value;
            var correctPassword = "Jaimeleshommes"; // Change par ton mot de passe

            if (enteredPassword === correctPassword) {
                document.getElementById("content").style.display = "block";
            } else {
                alert("Mot de passe incorrect !");
            }
        }
    </script>
</body>
</html>
