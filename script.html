<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Lua</title>
</head>
<body>
    <pre id="scriptContent"></pre>
    <script>
        fetch('https://soonjespere.onrender.com/script.lua')
            .then(response => response.text())
            .then(data => {
                document.getElementById('scriptContent').textContent = data;
            })
            .catch(err => console.log(err));
    </script>
</body>
</html>
